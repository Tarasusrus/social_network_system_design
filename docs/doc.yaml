openapi: 3.0.0

info:
  version: 1.0.0
  title: Социальная сеть для путешественников (ССДП)
  description: |-
    - публикация постов с фото и гео;
    - оценки/комментарии;
    - подписки;
    - лента по подпискам;
    - поиск по гео.

servers:
  - url: https://localhost:80

security:
  - jwt_auth: []

tags:
  - name: publication
    description: Operations with travel posts
  - name: feed
    description: Access to user feeds
  - name: comment
    description: Operations with post comments
  - name: reaction
    description: Operations with post reactions
  - name: auth
    description: Authentication


paths:
  /publications:
    post:
      tags: [ publication ]
      security:
        - jwt_auth: []
      summary: Create new publication
      description: Создать пост с описанием, гео и фото
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicationCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Publication'
        '400': { description: Bad request }
        '401': { description: Unauthorized }

  /publications/{post_id}:
    put:
      tags: [ publication ]
      security:
        - jwt_auth: []
      summary: Update my publication
      parameters:
        - in: path
          name: post_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicationUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Publication'
        '400': { description: Bad request }
        '401': { description: Unauthorized }
        '404': { description: Not found }

    delete:
      tags: [ publication ]
      security:
        - jwt_auth: []
      summary: Delete my publication
      parameters:
        - in: path
          name: post_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Deleted }
        '401': { description: Unauthorized }
        '404': { description: Not found }

  /feeds:
    get:
      tags: [ feed ]
      summary: Show feed
      description: Feed - list of publications by follows (offset pagination).
      security:
        - jwt_auth: [ ]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, format: int32, default: 20, minimum: 1, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, format: int32, default: 0, minimum: 0 }
        - name: q
          in: query
          schema: { type: string, maxLength: 200 }
          description: Text search query
        - name: order
          in: query
          schema: { type: string, enum: [ desc, asc ], default: desc }
          description: Sort direction for created_at
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedPage'
        '401': { description: Unauthorized }
        '400': { description: Invalid params }

  /auth/login:
    post:
      tags: [ auth ]
      security: [ ]
      summary: Login with username/password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'
        '401': { description: Invalid credentials }

  /auth/refresh:
    post:
      tags: [ auth ]
      security: [ ]   # публично
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRefreshRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'
        '401': { description: Invalid refresh token }

  /auth/logout:
    post:
      tags: [ auth ]
      security:
        - jwt_auth: [ ]
      summary: Revoke current session
      responses:
        '204': { description: No Content }
        '401': { description: Unauthorized }

  /comments:
    get:
      security: [ ]
      tags: [ comment ]
      summary: List comments by post
      parameters:
        - in: query
          name: post_id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Comment' }
                  limit: { type: integer }
                  offset: { type: integer }
        '400': { description: Bad request }
    post:
      tags: [ comment ]
      security:
        - jwt_auth: []
      summary: Create comment
      description: Оставить комментарий к посту
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          description: Ключ идемпотентности для безопасного ретрая
          schema: { type: string, maxLength: 64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400': { description: Bad request }
        '401': { description: Unauthorized }
        '404': { description: Post not found }

  /comments/{comment_id}:
    put:
      tags: [ comment ]
      security:
        - jwt_auth: []
      summary: Update my comment
      parameters:
        - in: path
          name: comment_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400': { description: Bad request }
        '401': { description: Unauthorized }
        '404': { description: Comment not found }
        '409': { description: Conflict }

    delete:
      tags: [ comment ]
      security:
        - jwt_auth: []
      summary: Delete my comment
      parameters:
        - in: path
          name: comment_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Deleted }
        '401': { description: Unauthorized }
        '404': { description: Comment not found }

  /reactions:
    put:
      security:
        - jwt_auth: [ ]
      tags: [ reaction ]
      summary: Set/replace my reaction for post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ post_id, type ]
              properties:
                post_id: { type: string, format: uuid }
                type: { type: integer, enum: [ 1,2,3 ] }
      responses:
        '204': { description: No Content }
        '401': { description: Unauthorized }

    delete:
      security:
        - jwt_auth: [ ]
      tags: [ reaction ]
      summary: Remove my reaction for post
      parameters:
        - in: query
          name: post_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: No Content }
        '401': { description: Unauthorized }



components:

  securitySchemes:
    jwt_auth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuthLoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string, maxLength: 128 }
        password: { type: string, format: password, maxLength: 256 }

    AuthRefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }

    AuthLoginResponse:
      type: object
      properties:
        access_token:  { type: string }
        refresh_token: { type: string }
        token_type:    { type: string, example: Bearer }
        expires_in:    { type: integer, example: 900 }

    Publication:
      type: object
      properties:
        id:       { type: string, format: uuid }
        user_id:  { type: integer, format: int64 }
        geo:
          type: object
          properties:
            lat: { type: number, format: double }
            lon: { type: number, format: double }
        describe:      { type: string, maxLength: 2048 }
        photo:         { type: string, maxLength: 256, description: link to photo }
        created_at:    { type: string, format: date-time }
        updated_at:    { type: string, format: date-time }
        counters:
          type: object
          properties:
            likes:    { type: integer, format: int32 }
            comments: { type: integer, format: int32 }

    Comment:
      type: object
      properties:
        comment_id: { type: string, format: uuid }
        post_id:    { type: string, format: uuid }
        author_id:  { type: integer, format: int64 }
        text:       { type: string, maxLength: 1024 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    PublicationCreate:
      type: object
      required: [ geo, describe, photo ]
      properties:
        geo:
          type: object
          required: [ lat, lon ]
          properties:
            lat: { type: number, format: double }
            lon: { type: number, format: double }
        describe:
          type: string
          maxLength: 2048
        photo:
          type: string
          maxLength: 256
          description: Link to photo

    PublicationUpdate:
      type: object
      properties:
        geo:
          type: object
          properties:
            lat: { type: number, format: double }
            lon: { type: number, format: double }
        describe:
          type: string
          maxLength: 2048
        photo:
          type: string
          maxLength: 256

    FeedItem:
      type: object
      properties:
        post_id: { type: string, format: uuid }
        author:
          type: object
          properties:
            id:         { type: integer, format: int64 }
            username:   { type: string }
            avatar_url: { type: string, maxLength: 256 }
            is_followed: { type: boolean }
        geo:
          type: object
          properties:
            lat: { type: number, format: double }
            lon: { type: number, format: double }
        describe:       { type: string, maxLength: 2048 }
        photo_preview:  { type: string, maxLength: 256 }
        created_at:     { type: string, format: date-time }
        counters:
          type: object
          properties:
            likes:    { type: integer, format: int32 }
            comments: { type: integer, format: int32 }
        my_reaction:
          type: integer
          nullable: true
          description: "null | 1 | 2 | 3"
    CommentCreate:
      type: object
      required: [ post_id, text ]
      properties:
        post_id:
          type: string
          format: uuid
        text:
          type: string
          maxLength: 1024

    CommentUpdate:
      type: object
      properties:
        text:
          type: string
          maxLength: 1024

    FeedPage:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/FeedItem' }
        limit:  { type: integer }
        offset: { type: integer }